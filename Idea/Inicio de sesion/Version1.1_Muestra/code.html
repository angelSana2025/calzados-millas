<!DOCTYPE html><html class="light" lang="es"><head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Calzados Millas - Inicio de Sesión</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#984258",
                        "primary-container": "#e8839a",
                        "inverse-primary": "#ffb1c1",
                        "background": "#fff7f9",
                        "surface": "#ffffff",
                        "on-surface": "#251721",
                        "on-background": "#251721",
                        "bg-light": "#FDE2E7",
                        "border-soft": "#f3e8eb",
                        "primary-light": "#FACBD5",
                        "text-main": "#251721",
                        "accent-rose": "#E8839A",
                        "field-bg": "#f9f2f4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.375rem",
                        "lg": "0.75rem",
                        "xl": "1rem",
                        "card": "24px",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "container-margin": "32px",
                        "section-gap": "48px",
                        "stack-sm": "6px",
                        "base": "12px",
                        "stack-md": "16px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter", "sans-serif"],
                        "headline-lg": ["Inter", "sans-serif"],
                        "headline-md": ["Inter", "sans-serif"],
                        "body-md": ["Inter", "sans-serif"],
                        "body-sm": ["Inter", "sans-serif"]
                    },
                    "fontSize": {
                        "body-lg": ["16px", {"lineHeight": "1.7", "fontWeight": "400"}],
                        "body-md": ["14px", {"lineHeight": "1.6", "fontWeight": "500"}],
                        "body-sm": ["13px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "1.1", "fontWeight": "700", "letterSpacing": "-0.02em"}],
                        "headline-md": ["20px", {"lineHeight": "1.2", "fontWeight": "600", "letterSpacing": "-0.01em"}]
                    },
                    "boxShadow": {
                        "soft": "0px 20px 40px rgba(152, 66, 88, 0.04)",
                        "hover": "0px 30px 60px rgba(152, 66, 88, 0.08)"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 0% 0%, #fff7f9 0%, #fde2e7 100%);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
        }
        .transition-standard {
            transition: all 300ms cubic-bezier(0.23, 1, 0.32, 1);
        }
        .hairline-border {
            border: 0.5px solid rgba(152, 66, 88, 0.1);
        }
        /* Soft mesh background effect */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: #fff7f9;
            background-image: 
                radial-gradient(at 0% 0%, hsla(347,87%,94%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(347,50%,90%,1) 0, transparent 50%), 
                radial-gradient(at 100% 100%, hsla(347,87%,94%,1) 0, transparent 50%), 
                radial-gradient(at 0% 100%, hsla(347,50%,92%,1) 0, transparent 50%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-gutter">
<div class="mesh-bg"></div>
<!-- Login Container -->
<main class="w-full max-w-[480px] animate-in fade-in slide-in-from-bottom-8 duration-1000">
<!-- Logo / Branding -->
<div class="flex flex-col items-center mb-section-gap">
<div class="w-14 h-14 bg-primary/90 backdrop-blur-sm rounded-2xl flex items-center justify-center shadow-lg mb-stack-md">
<span class="material-symbols-outlined text-white text-3xl">shopping_bag</span>
</div>
<h2 class="text-primary font-headline-md text-headline-md opacity-90">Calzados Millas</h2>
<p class="text-on-surface/50 text-body-sm tracking-widest uppercase mt-1">Luxury Inventory Management</p>
</div>
<!-- Login Card -->
<section class="bg-white rounded-card shadow-soft hairline-border p-10 md:p-14 transition-standard hover:shadow-hover">
<header class="mb-10 text-center">
<h1 class="text-text-main font-headline-lg text-headline-lg mb-3">Inicio de sesión</h1>
<p class="text-on-surface/60 text-body-md">Accede al panel de control de calzado.</p>
</header>
<form action="#" class="space-y-8" method="POST" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-stack-sm">
<label class="block text-body-sm font-semibold text-text-main/70 ml-1 uppercase tracking-wider" for="email">Correo Electrónico</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface/30 group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-field-bg border-none rounded-xl focus:ring-2 focus:ring-primary-light/50 focus:bg-white outline-none transition-standard text-body-lg placeholder:text-on-surface/20" id="email" name="email" placeholder="ejemplo@millas.com" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div class="space-y-stack-sm">
<div class="flex justify-between items-center px-1">
<label class="block text-body-sm font-semibold text-text-main/70 uppercase tracking-wider" for="password">Contraseña</label>
<a class="text-body-sm text-primary/70 hover:text-primary transition-colors font-medium" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface/30 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-field-bg border-none rounded-xl focus:ring-2 focus:ring-primary-light/50 focus:bg-white outline-none transition-standard text-body-lg placeholder:text-on-surface/20" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface/30 hover:text-text-main transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center px-1">
<input class="w-4 h-4 text-primary border-primary-light/30 rounded focus:ring-primary bg-field-bg" id="remember" type="checkbox">
<label class="ml-3 text-body-sm text-on-surface/60 cursor-pointer select-none" for="remember">Mantener sesión iniciada</label>
</div>
<!-- Action Buttons -->
<div class="pt-4 space-y-4">
<button class="w-full h-[56px] bg-accent-rose text-white font-semibold rounded-full shadow-lg shadow-accent-rose/20 hover:shadow-xl hover:shadow-accent-rose/30 hover:-translate-y-0.5 active:translate-y-0 transition-standard flex items-center justify-center gap-base" type="submit">
<span class="">Entrar</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button><div class="py-4 flex items-center gap-4">
    <div class="h-px flex-1 bg-on-surface/10"></div>
    <span class="text-body-sm text-on-surface/40 uppercase tracking-widest">O continuar con</span>
    <div class="h-px flex-1 bg-on-surface/10"></div>
</div>
<div class="grid grid-cols-3 gap-4">
    <button type="button" class="flex items-center justify-center h-14 rounded-xl border border-on-surface/10 hover:bg-field-bg hover:border-primary/20 transition-standard group">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"></path>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"></path>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"></path>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z"></path>
        </svg>
    </button>
    <button type="button" class="flex items-center justify-center h-14 rounded-xl border border-on-surface/10 hover:bg-field-bg hover:border-primary/20 transition-standard group">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
            <path fill="#f35325" d="M1 1h10v10H1z"></path>
            <path fill="#81bc06" d="M13 1h10v10H13z"></path>
            <path fill="#05a6f0" d="M1 13h10v10H1z"></path>
            <path fill="#ffba08" d="M13 13h10v10H13z"></path>
        </svg>
    </button>
    <button type="button" class="flex items-center justify-center h-14 rounded-xl border border-on-surface/10 hover:bg-field-bg hover:border-primary/20 transition-standard group">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="#251721">
            <path d="M17.05 20.28c-.98.95-2.05 1.72-3.21 1.72-1.13 0-1.5-.69-2.84-.69-1.33 0-1.75.67-2.84.67-1.13 0-2.25-.8-3.26-1.77-2.06-1.98-3.64-5.59-3.64-8.73 0-3.14 1.64-4.8 3.21-4.8 1.07 0 1.91.63 2.65.63.73 0 1.73-.75 2.98-.75 1.1 0 2.48.54 3.31 1.62-2.1 1.26-1.76 4.01.41 4.91-.83 2.04-1.83 4.19-2.77 5.13zM12.03 5.19c-.11-1.35.8-2.68 2.04-3.19.13 1.38-.83 2.66-2.04 3.19z"></path>
        </svg>
    </button>
</div>
<button class="w-full h-[56px] bg-transparent text-text-main/60 font-medium rounded-full border border-transparent hover:bg-field-bg hover:text-text-main transition-standard" type="button">
                        Volver al inicio
                    </button>
</div>
</form>
</section>
<!-- Footer Decoration / Info -->
<footer class="mt-section-gap text-center">
<p class="text-body-sm text-on-surface/40 leading-relaxed">
                © 2024 Calzados Millas. Sistema de gestión interno.<br>
<span class="opacity-80">Desarrollado para la excelencia en retail.</span>
</p>
</footer>
</main>
<script>
        // Micro-interaction for password visibility toggle
        document.querySelectorAll('button[type="button"]').forEach(btn => {
            const icon = btn.querySelector('.material-symbols-outlined');
            if (icon && (icon.textContent === 'visibility' || icon.textContent === 'visibility_off')) {
                const passInput = document.getElementById('password');
                btn.addEventListener('click', () => {
                    const isVisible = passInput.type === 'text';
                    passInput.type = isVisible ? 'password' : 'text';
                    icon.textContent = isVisible ? 'visibility' : 'visibility_off';
                    icon.style.fontVariationSettings = isVisible ? "'FILL' 0" : "'FILL' 1";
                });
            }
        });
    </script>


</body></html>
